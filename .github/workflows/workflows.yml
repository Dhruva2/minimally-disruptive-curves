name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # IMPORTANT: this is required for Trusted Publishing (OIDC)
      id-token: write
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        
      - name: Build package
        run: uv build
        
      - name: Publish to PyPI
        run: uv publish --token ${{ secrets.PYPI_TOKEN }}
